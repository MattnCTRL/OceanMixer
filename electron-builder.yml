appId: com.oceanmixer.app
productName: OceanMixer
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
# FFmpeg/FFprobe ship as native binaries inside node_modules; they must be
# unpacked from the asar archive so they can be spawned at runtime.
asarUnpack:
  - node_modules/ffmpeg-static/**
  - node_modules/ffprobe-static/**
mac:
  category: public.app-category.video
  icon: build/icon.icns
  target:
    - dmg
    - zip
  hardenedRuntime: true
  gatekeeperAssert: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: OceanMixer records audio (for example, music routed through a loopback device) into your project.
    NSCameraUsageDescription: OceanMixer can record from connected cameras into your project.
win:
  target:
    - nsis
linux:
  target:
    - AppImage
  category: AudioVideo
